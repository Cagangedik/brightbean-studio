# Dokploy-specific compose for Brightbean Studio.
# Differs from docker-compose.prod.yml: no Caddy (Dokploy's Traefik handles
# TLS + routing via the attached domain), and the dokploy-network is used so
# Traefik can reach the app. Postgres stays internal (no published ports).
services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: brightbean
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - dokploy-network

  migrate:
    build: .
    # Run migrations, then idempotently bootstrap a superuser from
    # BOOTSTRAP_SUPERUSER_* env (no-op when those vars are unset).
    command: sh -c "python manage.py migrate --noinput && python manage.py bootstrap_superuser"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/brightbean
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network

  app:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/brightbean
      - REDIS_URL=redis://redis:6379/0
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network

  worker:
    build: .
    command: python manage.py process_tasks
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/brightbean
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network

volumes:
  postgres_data:
  media_data:
  redis_data:

networks:
  dokploy-network:
    external: true
