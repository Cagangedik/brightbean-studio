{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ company }}{% endblock %}</title>
    <link rel="icon" href="{% static 'favicon/favicon.ico' %}" sizes="any">
    <style nonce="{{ request.csp_nonce }}">
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1f2328;
            background: #f6f7f9;
        }
        .wrap { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }
        header { border-bottom: 1px solid #e3e6ea; padding-bottom: 20px; margin-bottom: 28px; }
        header .brand { font-size: 15px; font-weight: 700; color: #c4762a; letter-spacing: .2px; }
        h1 { font-size: 28px; margin: 14px 0 4px; }
        .updated { color: #6b7178; font-size: 13px; }
        h2 { font-size: 18px; margin: 32px 0 8px; }
        p, li { font-size: 15px; color: #2d333a; }
        a { color: #c4762a; }
        ul { padding-left: 22px; }
        footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid #e3e6ea; font-size: 13px; color: #6b7178; }
        .nav { margin-top: 8px; }
        .nav a { margin-right: 16px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div class="brand">{{ company }}</div>
            <h1>{% block heading %}{% endblock %}</h1>
            <div class="updated">Last updated: {{ last_updated }}</div>
            <div class="nav">
                <a href="/terms/">Terms of Service</a>
                <a href="/privacy/">Privacy Policy</a>
            </div>
        </header>
        <main>
            {% block body %}{% endblock %}
        </main>
        <footer>
            &copy; {{ company }}. Questions? <a href="mailto:{{ contact_email }}">{{ contact_email }}</a>
        </footer>
    </div>
</body>
</html>
